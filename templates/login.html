<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler AI — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 flex items-center justify-center">
  <div class="w-full max-w-sm space-y-6 p-8 bg-gray-900 rounded-2xl shadow-2xl border border-gray-800">
    <div class="text-center space-y-1">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-xl font-bold mx-auto">S</div>
      <h1 class="text-2xl font-bold text-white mt-3">Scheduler AI</h1>
      <p class="text-sm text-gray-400">Your intelligent planning assistant</p>
    </div>

    {% if error %}
    <div class="bg-red-900/40 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-3">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Username</label>
        <input name="username" required autofocus
          class="w-full px-3 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="your-name">
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Passcode</label>
        <input name="passcode" type="password" required
          class="w-full px-3 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white rounded-lg font-medium transition-colors">
        Sign in
      </button>
    </form>

    <p class="text-xs text-center text-gray-500">
      First time? Just pick a username and passcode — your account will be created automatically.<br>
      <span class="text-gray-600">Passcode cannot be recovered if lost.</span>
    </p>
  </div>
</body>
</html>
